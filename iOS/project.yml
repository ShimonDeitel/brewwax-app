name: brewwax
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
targets:
  brewwax:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Brew Wax - Batik Log
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batiklog
        PRODUCT_NAME: Brew Wax - Batik Log
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
    scheme:
      testTargets:
        - brewwaxTests
        - brewwaxUITests
  brewwaxTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: brewwax
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batiklog.tests
        GENERATE_INFOPLIST_FILE: true
  brewwaxUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: brewwax
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batiklog.uitests
        GENERATE_INFOPLIST_FILE: true
